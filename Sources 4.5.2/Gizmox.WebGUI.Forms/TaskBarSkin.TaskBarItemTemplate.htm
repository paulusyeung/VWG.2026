<div id="VWG_TaskBarItemTemplate" class="Context.MultiThemeDefault TaskBar-Item" style="display:none;float:Context.Left;"
            onmouseenter="Web_SetStyle(this, 'mouseenter', window);"
            onmouseover="Web_SetStyle(this, 'mouseenter', window);"
			onmouseup="Web_SetStyle(this, 'mouseenter', window);"
			onclick="mobjApp.Forms_RestoreTaskBarItem(window,this.id,true);" 
            onmouseleave="Web_SetStyle(this, 'mouseleave', window);"
			onmouseout="Web_SetStyle(this, 'mouseleave', window);"
			onmousedown="if(!mobjApp.Web_IsRightClick(event)){ Web_SetStyle(this, 'mousedown', window);}">
    <table class="Context.MultiThemeDefault Common-CellSpacing0 Common-CellPadding0 TaskBar-ItemFrame"  dir="ltr" >
        <colgroup>
        <col style="width:[Skin.ItemLeftFrameWidth]px;"/>
        <col/>
        <col style="width:[Skin.ItemRightFrameWidth]px;"/>
        </colgroup>
        <tr style="height:100%;">
            <td id="VWG_TaskBarItemLeftFrame" class="Context.MultiThemeDefault TaskBar-ItemLeftFrame" style="background-position: left top;"></td>
            <td id="VWG_TaskBarItemCenterFrame" class="Context.MultiThemeDefault TaskBar-ItemCenterFrame" dir="Context.Direction" ></td>
            <td id="VWG_TaskBarItemRightFrame" class="Context.MultiThemeDefault TaskBar-ItemRightFrame" style="background-position: right top;"></td>
        </tr>
    </table>
</div>
