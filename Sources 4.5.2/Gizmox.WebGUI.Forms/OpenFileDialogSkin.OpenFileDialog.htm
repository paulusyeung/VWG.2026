<!DOCTYPE html>
<html lang="Context.Language">
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
<LINK href="[Skin.Path]OpenFileDialog.css.wgx" type="text/css" rel="stylesheet"></LINK>
    <script src="[Skin.CommonPath]HtmlBoxFrame.js.wgx"></script>
    <script src="[Skin.Path]OpenFileDialog.js.wgx"></script>
    <script src="[Skin.Path]OpenFileDialog.Plugins.js.wgx"></script>
    <script src="[Skin.Path]OpenFileDialog.SWFUpload.js.wgx"></script>
    <script src="[Skin.Path]Plugins.js.wgx"></script>
    <script src="Resources.Includes.js.wgx"></script>
</head>
<body class="Common-Unselectable Upload-Body" onload="Upload_Init()" dir="Labels.DirAttribute" onselectstart="return false" oncontextmenu="return false" onunload = "Upload_SWFDestroy()">
    <div id="ClassicUploadFileTemplate" style="display: none;"><input id="" name="" type="file" class="Common-FontData" style="position:relative;height:20px;width:180px;top: 0px;"/><span class="Common-FontData Common-Unselectable Upload-Link" style="width: 30px; position: absolute; top: 5px; left: 190px;" onclick="Upload_RemoveClassicFile(this.parentNode)">Labels.Remove</span></div>
    <div id="VWG_DPI" style="position: absolute; height: 1in; width: 1in; visibility: hidden;overflow: hidden;"></div>
    <div style="position: absolute; padding: 5px; top: 0px; bottom: 40px; Labels.LeftAttribute: 0px;Labels.RightAttribute: 0px;">
        <form style="position: relative; width: 100%; height: 100%;" id="UploadForm" class="UploadPanel"action="" enctype="multipart/form-data" method="post" target="UPFRAME">
        <div id="UploadingInstructions" style="height: 20px; line-height: 20px; text-align: Labels.LeftAttribute; width: 100%;" class="Upload-Label">Labels.SelectFilesToUpload:</div>
        
        <div id="StandardUploadingActions" style="display: none; position: absolute; border-spacing: 0px;top: 20px; bottom: 0px; Labels.LeftAttribute: 0px; Labels.RightAttribute: 0px;">
            <div style="border-spacing: 0px; position: absolute; Labels.RightAttribute: 80px; Labels.LeftAttribute: 0px; top: 0px;bottom: 0px;">
                <div style="height: 100%; width: 100%; position: relative;">
                    <div class="Upload-ListFrame">
                        <table id="UploadList" class="Common-CellPadding0 Common-CellSpacing0 Upload-List">
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div id="ButtonsPanel" style="padding-Labels.LeftAttribute: 6px; vertical-align: top; box-sizing: border-box;border-spacing: 0px; width: 80px; position: absolute; Labels.RightAttribute: 0px;">
                <input type="button" class="Upload-Button Upload-ButtonNormal" 
					onmouseenter="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonOver'"
                    onmouseover="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonOver'" 
					onmousedown="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonDown'"
                    onmouseup="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonOver'" 
					onmouseleave="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonNormal'"
                    onmouseout="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonNormal'" 
				    ID="StandardUploadButton" NAME="StandardUploadButton" dir="ltr" value="Labels.Add" onclick="Upload_BrowseFile()">  
                
					<input type="button" class="Upload-Button Upload-ButtonNormal" 
					onmouseenter="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonOver'"
                    onmouseover="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonOver'" 
					onmousedown="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonDown'"
                    onmouseup="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonOver'" 
					onmouseleave="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonNormal'"
                    onmouseout="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonNormal'" 
				    value="Labels.Remove" onclick="Upload_RemoveFile()" ID="UploadRemoveButton" NAME="UploadRemoveButton">
            </div>
        </div>
        <div id="ClassicUploadingActions" style="display:none;position: absolute; border-spacing: 0px;top: 20px; bottom: 0px; Labels.LeftAttribute: 0px; Labels.RightAttribute: 0px;">
            <div style="border-spacing: 0px; position: absolute; Labels.RightAttribute: 80px; Labels.LeftAttribute: 0px; top: 0px;bottom: 0px;">
                <div style="height: 100%; width: 100%; position: relative;">
                    <div id="ClassicUploadFileList" class="Upload-ListFrame">
                    </div>
                </div>
            </div>
            <div style="padding-Labels.LeftAttribute: 6px; vertical-align: top; box-sizing: border-box;border-spacing: 0px; width: 80px; position: absolute; Labels.RightAttribute: 0px;">
                <input type="button" class="Upload-Button Upload-ButtonNormal" 
					onmouseenter="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonOver'"
                    onmouseover="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonOver'" 
					onmousedown="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonDown'"
                    onmouseup="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonOver'" 
					onmouseleave="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonNormal'"
                    onmouseout="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonNormal'" id="ClassicUploadButton"
                    name="ClassicUploadButton" dir="ltr" value="Labels.Add" onclick="Upload_BrowseFile()">
            </div>
        </div>
        </form>
        <div id="UploadMessage" class="UploadPanel" style="display: none;">
	                        <div id="UploadMessageText" class="Common-AlignCenter Upload-Label">&nbsp;</div>
        </div>
    </div>
    <div style="height: 40px; padding: 5px; position: absolute; bottom: 0px; Labels.RightAttribute: 0px;box-sizing: border-box;">
        <div id="UploadButtons" style="position: relative; height: 100%; width: 100%;">
            <input type="button" class="Upload-Button Upload-ButtonNormal" 
				onmouseenter="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonOver'"
                onmouseover="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonOver'" 
				onmousedown="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonDown'"
                onmouseup="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonOver'" 
				onmouseleave="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonNormal'"
                onmouseout="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonNormal'" 
                value="Labels.Ok" ID="UploadOkButton" NAME="UploadOkButton" onclick="Upload_Submit()">
                		
            <input type="button" class="Upload-Button Upload-ButtonNormal" 
				onmouseenter="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonOver'"
                onmouseover="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonOver'" 
				onmousedown="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonDown'"
                onmouseup="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonOver'" 
				onmouseleave="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonNormal'"
                onmouseout="this.className=Upload_GetThemePrefix() + 'Upload-Button Upload-ButtonNormal'"
	            value="Labels.Cancel" ID="UploadCancelButton" NAME="UploadCancelButton" onclick="Upload_CloseWindow()">
        </div>
    </div>
    <iframe id="UPFRAME" name="UPFRAME" src="[Skin.Path]Common.About.Blank.htm.wgx" style="position: absolute; visibility: hidden; width: 1px; height: 1px; top: 1px; left: 1px"></iframe>
</body>
</html>
