name: "Build and Publish Container"

on:
  push:
    branches:
      - main
      - master

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build and publish Docker image
        env:
          IMAGE_NAME: gizmox/webgui-blazorpilot
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd NetCore/Gizmox.WebGUI.BlazorPilot
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag $IMAGE_NAME:$IMAGE_TAG ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:$IMAGE_TAG
          docker push ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:$IMAGE_TAG

      - name: Set latest tag
        env:
          IMAGE_NAME: gizmox/webgui-blazorpilot
          IMAGE_TAG: latest
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:$IMAGE_TAG
          docker push ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:$IMAGE_TAG
